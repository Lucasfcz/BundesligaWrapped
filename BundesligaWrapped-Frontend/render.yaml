services:
  - type: web
    name: bundesliga-wrapped
    runtime: static
    buildCommand: bun install && bun run build
    staticPublishPath: ./dist/client
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable